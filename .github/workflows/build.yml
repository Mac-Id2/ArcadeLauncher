name: Build Arcade Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest, macos-13]

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          pyinstaller --noconsole launcher.py
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true

      - name: Archivieren
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist/launcher')"

      - name: Test-Artifact (Manueller Lauf)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.os }}
          path: Launcher-${{ matrix.os }}.zip

      - name: Release Erstellen (Tag Lauf)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
