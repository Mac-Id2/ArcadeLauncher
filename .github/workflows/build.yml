name: Build Arcade Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: ubuntu-latest
            artifact_name: Linux
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 3.10 ist die stabilste Basis für Cross-Builds

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          # Wir erzwingen eine Setuptools-Version, die den NullProvider noch hat
          pip install "setuptools<69.0.0" pygame pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          if [[ "${{ matrix.artifact_name }}" == "Mac_Intel" ]]; then
            # Der entscheidende Befehl für das alte MacBook:
            # Wir installieren ALLES im Intel-Modus neu
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools<69.0.0" pygame pyinstaller --force-reinstall
            arch -x86_64 pyinstaller --noconsole launcher.py
          else
            pyinstaller --noconsole launcher.py
          fi
          # Assets kopieren
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true

      - name: Archivieren
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.artifact_name }}', 'zip', 'dist/launcher')"

      - name: Test-Artifact (Manueller Lauf)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip

      - name: Release Erstellen (Tag Lauf)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.artifact_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
