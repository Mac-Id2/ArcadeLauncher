name: Build Arcade Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read              # Build braucht nur Lesezugriff
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: ubuntu-latest
            artifact_name: linux-x64
          - os: macos-latest
            artifact_name: macos-arm64
          - os: macos-26-intel          # macos-26-intel stabiler Intel-Runner (x86_64)
            artifact_name: macos-amd64

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          # Exakte Version pinnen – letzte stabile vor dem NullProvider-Breaking-Change
          pip install "setuptools==68.2.2" pygame pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          # Kein arch-Sonderfall nötig – jeder Runner baut nativ
          pyinstaller --noconsole launcher.py

          # Assets nur kopieren wenn vorhanden – Fehler nicht verschlucken
          [ -d assets ] && cp -r assets dist/launcher/
          [ -f games.json ] && cp games.json dist/launcher/

      - name: Archivieren
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.artifact_name }}', 'zip', 'dist/launcher')"

      # Immer hochladen – wird von release-Job oder manuell genutzt
      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build                  # Wartet bis ALLE 4 Matrix-Jobs fertig sind
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write             # Schreibrecht nur in diesem einen Job
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/        # Legt an: artifacts/Launcher-windows-x64/Launcher-windows-x64.zip usw.

      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
