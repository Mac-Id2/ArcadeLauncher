name: Build Arcade Launcher

on:
  workflow_dispatch: # Manueller Start über die GitHub-Oberfläche.
  push:
    tags:
      - 'v*'         # Vollständiger Release-Build für alle Plattformen.
    branches:
      - 'feature/**' # Pre-Release-Build (nur Linux) bei jedem Push auf Feature-Branches.

jobs:

  # ── Feature-Branch: nur Linux → Pre-Release ─────────────────────────────────
  build-feature:
    name: Build Linux (Feature Branch)
    if: startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python initialisieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools==68.2.2" "pygame==2.6.1" "websockets==15.0.1" "pyserial==3.5" "pyinstaller==6.20.0"

      - name: PyInstaller Build
        run: |
          mkdir -p dist/final_delivery
          pyinstaller --noconsole --onefile --hidden-import websockets --hidden-import serial launcher.py
          mv dist/launcher dist/final_delivery/
          chmod +x dist/final_delivery/launcher
          [ -d assets ] && cp -r assets dist/final_delivery/
          [ -f games.json ] && cp games.json dist/final_delivery/

      - name: ZIP erstellen
        run: |
          cd dist/final_delivery
          zip -r "../../Launcher-linux-x64.zip" .

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-linux-x64
          path: Launcher-linux-x64.zip
          retention-days: 7

  pre-release:
    name: GitHub Pre-Release erstellen
    runs-on: ubuntu-latest
    needs: build-feature
    if: startsWith(github.ref, 'refs/heads/feature/')
    permissions:
      contents: write

    steps:
      - name: Artifact herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Tag-Namen darf keinen Schrägstrich enthalten (feature/xyz → feature-xyz)
      - name: Branch-Namen bereinigen
        id: branch
        run: echo "slug=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Pre-Release publizieren
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-${{ steps.branch.outputs.slug }}
          name: Pre-Release (${{ github.ref_name }})
          prerelease: true
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Tag-Build: alle Plattformen → Release ───────────────────────────────────
  build:
    name: Build auf ${{ matrix.artifact_name }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: ubuntu-22.04
            artifact_name: linux-x64
          - os: macos-latest
            artifact_name: macos-arm64
          - os: macos-latest
            artifact_name: macos-x64

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python initialisieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          # Rosetta 2 Workaround für Intel-Mac-Build auf ARM-Runner
          if [ "${{ matrix.artifact_name }}" = "macos-x64" ]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools==68.2.2" "pygame==2.6.1" "websockets==15.0.1" "pyserial==3.5" "pyinstaller==6.20.0"
          else
            python -m pip install --upgrade pip
            pip install "setuptools==68.2.2" "pygame==2.6.1" "websockets==15.0.1" "pyserial==3.5" "pyinstaller==6.20.0"
          fi

      - name: PyInstaller Build-Prozess
        shell: bash
        run: |
          mkdir -p dist/final_delivery

          if [ "${{ matrix.artifact_name }}" = "macos-x64" ]; then
            arch -x86_64 pyinstaller --noconsole --onefile --hidden-import websockets --hidden-import serial launcher.py
          else
            pyinstaller --noconsole --onefile --hidden-import websockets --hidden-import serial launcher.py
          fi

          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/launcher.exe dist/final_delivery/
          else
            mv dist/launcher dist/final_delivery/
            chmod +x dist/final_delivery/launcher
          fi

          [ -d assets ] && cp -r assets dist/final_delivery/
          [ -f games.json ] && cp games.json dist/final_delivery/

      - name: Release-Archivierung (ZIP)
        shell: bash
        run: |
          cd dist/final_delivery
          if [ "${{ runner.os }}" = "Linux" ]; then
            zip -r "../../Launcher-${{ matrix.artifact_name }}.zip" .
          else
            python -c "import shutil; shutil.make_archive('../../Launcher-${{ matrix.artifact_name }}', 'zip', '.')"
          fi

      - name: Temporäres Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Alle kompilierten Artifacts sammeln
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Release publizieren und Assets anheften
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
