name: Build Arcade Launcher (Release-Workflow)

on:
  push:
    branches: [ main ]  # Baut bei jedem normalen Hochladen (Testen)
    tags:
      - 'v*'           # Erstellt ein echtes Release (Produktion)

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Hier sind nun beide Mac-Architekturen plus Windows und Linux enthalten
        os: [windows-latest, ubuntu-latest, macos-latest, macos-15]

    steps:
      - name: 1. Code auschecken
        uses: actions/checkout@v4

      - name: 2. Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Bibliotheken installieren
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: 4. Launcher verpacken
        shell: bash
        run: |
          pyinstaller --noconsole launcher.py
          cp -r assets dist/launcher/
          cp games.json dist/launcher/

      - name: 5. Zippen mit Version und Architektur
        shell: bash
        run: |
          # Erstellt ZIPs wie ArcadeLauncher-v1.0.0-macos-13.zip
          python -c "import shutil; shutil.make_archive('ArcadeLauncher-${{ github.ref_name }}-${{ matrix.os }}', 'zip', 'dist')"

      - name: 6. Echtes GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: ArcadeLauncher-${{ github.ref_name }}-${{ matrix.os }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
