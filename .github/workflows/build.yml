name: Build Arcade Launcher
on:
  workflow_dispatch: # Manueller Start zum Testen
  push:
    tags:
      - 'v*' # Offizielles Release

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Wir brauchen nur noch 3 Runner, da Mac jetzt 2-in-1 ist!
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install pygame pyinstaller

      - name: Build Launcher
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # Erstellt die Universal-Datei für Intel UND Apple Silicon
            pyinstaller --noconsole --target-arch universal2 launcher.py
          else
            pyinstaller --noconsole launcher.py
          fi
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true

      - name: Zippen
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist/launcher')"

      - name: Test-Artifact (Manueller Lauf)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.os }}
          path: Launcher-${{ matrix.os }}.zip

      - name: Release Upload (Tag Lauf)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
