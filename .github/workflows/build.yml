name: Build Arcade Launcher 

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Wir nehmen macos-13 für Intel und macos-latest für Silicon
        os: [windows-latest, ubuntu-latest, macos-latest, macos-13]

    steps:
      - uses: actions/checkout@v4
      
      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          # Wir nutzen 3.11 auf Mac-Intel, da das stabiler mit PyInstaller ist
          python-version: ${{ matrix.os == 'macos-13' && '3.11' || '3.12' }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build
        shell: bash
        run: |
          # Kein universal2 mehr, um den Error zu vermeiden
          pyinstaller --noconsole launcher.py
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true

      - name: Zippen
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist/launcher')"

      - name: Test-Artifact (Manuell)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.os }}
          path: Launcher-${{ matrix.os }}.zip

      - name: Release Upload (Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
