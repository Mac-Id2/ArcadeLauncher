name: Build Arcade Launcher

on:
  # 1. Manueller Start (Zum Testen ohne Tag-Zwang)
  workflow_dispatch:

  # 2. Automatischer Start bei neuem Tag (Für das offizielle Release)
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Alle 4 Systeme, die du brauchst
        os: [windows-latest, ubuntu-latest, macos-latest, macos-13]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install pygame pyinstaller

      - name: Build
        shell: bash
        run: |
          pyinstaller --noconsole launcher.py
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true

      - name: Zippen
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.os }}', 'zip', 'dist/launcher')"

      # WENN MANUELL GESTARTET: Lade es als Artifact hoch (zum Testen)
      - name: Test-Artifact Upload
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Test-Build-${{ matrix.os }}
          path: Launcher-${{ matrix.os }}.zip

      # WENN PER TAG GESTARTET: Erstelle ein echtes Release
      - name: Release Upload
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
