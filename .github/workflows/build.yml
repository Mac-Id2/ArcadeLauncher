name: Build Arcade Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: ubuntu-latest
            artifact_name: Linux
          - os: macos-latest
            artifact_name: Mac_Silicon_M1_M2_M3
          - os: macos-13
            artifact_name: Mac_Intel_Alt

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          # Für Intel-Kompatibilität ist 3.11 auf dem alten Runner sicherer
          python-version: '3.11'
          # WICHTIG: Erzwingt Intel-Architektur auf dem Mac-Runner
          architecture: ${{ matrix.os == 'macos-13' && 'x64' || 'x64' }}

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          pyinstaller --noconsole launcher.py
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true

      - name: Archivieren
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.artifact_name }}', 'zip', 'dist/launcher')"

      - name: Test-Artifact (Manueller Lauf)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip

      - name: Release Erstellen (Tag Lauf)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.artifact_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
