name: Build Arcade Launcher

# Definiert die Auslöser (Triggers) für diese Pipeline.
on:
  workflow_dispatch: # Ermöglicht den manuellen Start über die GitHub-Oberfläche.
  push:
    tags:
      - 'v*' # Löst die Pipeline automatisch aus, wenn ein neuer Versions-Tag (z.B. v1.0.0) gepusht wird.

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    
    # --- Build-Matrix (Plattform-Definitionen) ---
    strategy:
      fail-fast: false # Verhindert, dass alle Builds abbrechen, falls ein einzelnes OS fehlschlägt.
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: ubuntu-22.04
            artifact_name: linux-x64
          - os: macos-latest
            artifact_name: macos-arm64 # Nativer Build für Apple Silicon (M1/M2/M3)
          - os: macos-latest
            artifact_name: macos-x64   # Emulierter Build für Intel Macs (via Rosetta 2)

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python initialisieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        shell: bash
        run: |
          # --- Workaround für macOS Intel (x64) Builds ---
          # Da GitHub Actions native Intel-Runner (macos-13) depräkatiert hat ("not supported"),
          # erzwingen wir hier die Ausführung von Python/Pip unter der Rosetta 2 (x86_64) Emulation 
          # auf dem ARM-Server (macos-latest).
          if [ "${{ matrix.artifact_name }}" = "macos-x64" ]; then
            arch -x86_64 python -m pip install --upgrade pip
            arch -x86_64 pip install "setuptools==68.2.2" pygame pynput pyinstaller
          else
            # Standard-Installation für Windows, Linux und macOS ARM
            python -m pip install --upgrade pip
            pip install "setuptools==68.2.2" pygame pynput pyinstaller
          fi

      - name: PyInstaller Build-Prozess
        shell: bash
        run: |
          # Zielverzeichnis für das finale Release-Archiv anlegen
          mkdir -p dist/final_delivery
          
          # --- PyInstaller Ausführung ---
          # Auch der Build-Prozess selbst muss für Intel-Macs zwingend durch Rosetta geroutet werden.
          if [ "${{ matrix.artifact_name }}" = "macos-x64" ]; then
            arch -x86_64 pyinstaller --noconsole --onefile launcher.py
          else
            pyinstaller --noconsole --onefile launcher.py
          fi
          
          # --- Binärdateien strukturieren ---
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/launcher.exe dist/final_delivery/
          else
            mv dist/launcher dist/final_delivery/
            # WICHTIG: Unter unixoiden Systemen müssen die Ausführungsrechte nach dem Verschieben explizit neu gesetzt werden.
            chmod +x dist/final_delivery/launcher
          fi
          
          # Statische Ressourcen (Assets & Config) in das Auslieferungsverzeichnis kopieren
          [ -d assets ] && cp -r assets dist/final_delivery/
          [ -f games.json ] && cp games.json dist/final_delivery/

      - name: Release-Archivierung (ZIP)
        shell: bash
        run: |
          cd dist/final_delivery
          # OS-spezifische ZIP-Erstellung (Windows Runner haben standardmäßig kein 'zip' Kommando, daher der Python-Fallback)
          if [ "${{ runner.os }}" = "Linux" ]; then
            zip -r "../../Launcher-${{ matrix.artifact_name }}.zip" .
          else
            python -c "import shutil; shutil.make_archive('../../Launcher-${{ matrix.artifact_name }}', 'zip', '.')"
          fi

      - name: Temporäres Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip
          retention-days: 7

  # --- Automatisches GitHub Release ---
  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build # Wartet zwingend auf den erfolgreichen Abschluss aller Build-Jobs aus der Matrix
    if: startsWith(github.ref, 'refs/tags/') # Wird nur bei Version-Tags ausgeführt, nicht bei manuellen Dispatches
    permissions:
      contents: write
    steps:
      - name: Alle kompilierten Artifacts sammeln
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Release publizieren und Assets anheften
        uses: softprops/action-gh-release@v2
        with:
          # Greift alle zuvor erstellten ZIP-Dateien ab und hängt sie an das Release an
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
