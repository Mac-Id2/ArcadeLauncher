name: Build Arcade Launcher (Stable-Final)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build:
    name: Build auf ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Verhindert, dass Windows abgebrochen wird, nur weil Mac gerade hakt
      fail-fast: false 
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest, macos-12]

    steps:
      - name: 1. Code auschecken
        uses: actions/checkout@v4

      - name: 2. Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Bibliotheken installieren
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: 4. Launcher verpacken
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # Baut eine Datei für BEIDE Mac-Architekturen
            pyinstaller --noconsole --target-arch universal2 launcher.py
          else
            pyinstaller --noconsole launcher.py
          fi
          cp -r assets dist/launcher/ || true
          cp games.json dist/launcher/ || true
          
      - name: 5. Zippen
        shell: bash
        run: |
          python -c "import shutil; shutil.make_archive('ArcadeLauncher-${{ matrix.os }}', 'zip', 'dist/launcher')"

      - name: 6. Release erstellen (Nur bei Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ArcadeLauncher-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 7. Upload Artifact (Für normale Pushes ohne Tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.os }}
          path: ArcadeLauncher-${{ matrix.os }}.zip
