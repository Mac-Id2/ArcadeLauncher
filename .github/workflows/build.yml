name: Build Arcade Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: ubuntu-22.04
            artifact_name: linux-x64
          - os: macos-latest
            artifact_name: macos-arm64
          # --- NEU: Intel Mac hinzugefügt ---
          - os: macos-13
            artifact_name: macos-x64

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools==68.2.2" pygame pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          pyinstaller --noconsole --onefile launcher.py
          
          # Ordnerstruktur für Artifact vorbereiten
          mkdir -p dist/final_delivery
          
          # Binärdatei verschieben (Name unterscheidet sich je nach OS)
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/launcher.exe dist/final_delivery/
          else
            mv dist/launcher dist/final_delivery/
            # WICHTIG: Ausführungsrechte explizit setzen
            chmod +x dist/final_delivery/launcher
          fi
          
          # Assets kopieren
          [ -d assets ] && cp -r assets dist/final_delivery/
          [ -f games.json ] && cp games.json dist/final_delivery/

      - name: Archivieren
        shell: bash
        run: |
          cd dist/final_delivery
          if [ "${{ runner.os }}" = "Linux" ]; then
            zip -r "../../Launcher-${{ matrix.artifact_name }}.zip" .
          else
            python -c "import shutil; shutil.make_archive('../../Launcher-${{ matrix.artifact_name }}', 'zip', '.')"
          fi

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Release erstellen und Assets hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
