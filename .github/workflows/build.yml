name: Build Arcade Launcher

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build auf ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    # Schreibrecht nur hier – wird für upload-artifact und release benötigt
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
          - os: ubuntu-latest
            artifact_name: linux-x64
          - os: macos-latest
            artifact_name: macos-arm64
          - os: macos-13          # macos-13 = letzter Intel-Runner (x86_64)
            artifact_name: macos-amd64

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'            # Pakete werden gecacht – spart ~60s pro Job

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          # Exakte Version pinnen – letzte stabile vor dem NullProvider-Breaking-Change
          pip install "setuptools==68.2.2" pygame pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          # Kein arch-Sonderfall nötig – jeder Runner baut jetzt nativ
          pyinstaller --noconsole launcher.py

          # Assets nur kopieren wenn vorhanden – Fehler nicht verschlucken
          [ -d assets ] && cp -r assets dist/launcher/
          [ -f games.json ] && cp games.json dist/launcher/

      - name: Archivieren
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Launcher-${{ matrix.artifact_name }}', 'zip', 'dist/launcher')"

      - name: Test-Artifact (Manueller Lauf)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-${{ matrix.artifact_name }}
          path: Launcher-${{ matrix.artifact_name }}.zip

      - name: Release Erstellen (Tag Lauf)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Launcher-${{ matrix.artifact_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
